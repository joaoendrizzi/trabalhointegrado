<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerenciar Alunos - NAPNE</title>
  <link rel="stylesheet" href="../css/gerenciaralunos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"> </head>
<body>
  <header>
    <div class="container">
      <h1>Sistema NAPNE - Gerenciar Alunos</h1>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span id="userInfo">Carregando...</span>
      </div>
    </div>
  </header> 

  <div class="main-content">
    <aside class="sidebar">
      <div class="welcome-section">
        <h2>Bem-vindo!</h2>
      </div>
      <ul class="main-menu">
        <li><a href="#" onclick="goToHome(); return false;"><i class="fas fa-home"></i> Início</a></li>
        <li><a href="#" class="active"><i class="fas fa-user-graduate"></i> Alunos</a></li>
        <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
      </ul>
    </aside>

    <main class="container">
      <section class="alunos-section">
        <h2>Gerenciar Alunos</h2>
        <ul id="alunosList" class="alunos-list">
          </ul>
        <button id="addAlunoBtn" class="btn-primary">Adicionar Aluno</button>
      </section>
    </main>
  </div>

  <div id="addAlunoModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Adicionar Aluno</h2>
      <form id="addAlunoForm">
        <h3>Dados Completos do Aluno</h3>
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" required>
        
        <label for="dataNasc">Data de Nascimento:</label>
        <input type="date" id="dataNasc" required>
        
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" required>
        
        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" required>
        
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" required>
        
        <label for="email">E-mail:</label>
        <input type="email" id="email" required>
        
        <label for="curso">Curso:</label>
        <select id="curso" required>
          <option value="">Carregando cursos...</option>
        </select>
        
        <label for="matricula">Matrícula:</label>
        <input type="text" id="matricula" required>
        
        <label for="matriculaAtiva">Status da Matrícula:</label>
        <select id="matriculaAtiva" required>
          <option value="ativa">Ativa</option>
          <option value="inativa">Inativa</option>
        </select>
        
        <label for="monitoria">Monitoria:</label>
        <select id="monitoria" required>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
        
        <label for="atendPsico">Atendimento Psicopedagógico:</label>
        <select id="atendPsico" required>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
        
        <label>Necessidades (selecione uma ou mais):</label>
        <div id="necessidadesContainer">
          <p>Carregando necessidades...</p>
        </div>
        
        <label for="maior18">O aluno é maior de 18 anos?</label>
        <input type="checkbox" id="maior18">
        
        <div id="responsavelFields" class="hidden">
          <h4>Dados do Responsável <span class="optional">não obrigatório</span></h4>
          <label for="respNome">Nome Completo:</label>
          <input type="text" id="respNome">
          
          <label for="respTelefone">Telefone:</label>
          <input type="tel" id="respTelefone">
          
          <label for="respEmail">E-mail:</label>
          <input type="email" id="respEmail">
        </div>
        
        <button type="submit">Salvar</button>
        <button type="button" id="cancelarBtn">Cancelar</button>
      </form>
    </div>
  </div>

   <footer>
    <div class="container">
        <div class="footer-content">
            <div class="copyright">
                &copy; 2025 Sistema NAPNE - Todos os direitos reservados
            </div>
        </div>
    </div>
</footer>

  <script src="../js/iniciar.js"></script>
  <script src="../js/gerenciaralunos.js"></script>
</body>
</html>
